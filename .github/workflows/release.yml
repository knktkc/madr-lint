name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write   # required for npm OIDC trusted publishing

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - uses: changesets/action@v1
        with:
          publish: pnpm publish-ci
          version: pnpm changeset:version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tokenless publish via npm OIDC trusted publishing (registered on the
          # madr-lint npm package). pnpm 10 performs the OIDC token exchange from
          # the id-token permission above — no long-lived NPM_TOKEN. Provenance is
          # attested from the same id-token. Stay on pnpm 10: pnpm 11 has an OIDC
          # regression (pnpm/pnpm#11513).
          NPM_CONFIG_PROVENANCE: 'true'
