name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write   # required for npm OIDC trusted publishing

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # `changeset publish` shells out to the npm CLI. Node 22 bundles npm 10,
      # which cannot do OIDC trusted publishing (needs npm >= 11.5.1) — its
      # publish PUT gets a 404 (auth-shaped, not a real "not found"). Upgrade
      # npm before publishing; bump this pin deliberately.
      - run: npm install -g npm@11.18.0
      - uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          publish: pnpm publish-ci
          version: pnpm changeset:version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tokenless publish via npm OIDC trusted publishing (registered on the
          # madr-lint npm package). The npm CLI (upgraded above) performs the
          # OIDC token exchange from the id-token permission — no long-lived
          # NPM_TOKEN. Provenance is attested from the same id-token.
          NPM_CONFIG_PROVENANCE: 'true'
