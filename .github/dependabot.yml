version: 2

# Cooldown mirrors the pnpm `minimumReleaseAge` guard (3 days): Dependabot
# resolves versions itself and would otherwise bypass it. Majors wait a week.
# Cooldown applies to VERSION updates only — SECURITY updates land immediately.
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    cooldown:
      default-days: 3
      semver-major-days: 7
    groups:
      types:
        patterns:
          - "@types/*"
      build:
        patterns:
          - tsup
          - typescript
          - vitest
          - oxlint
          - tsx
      mdast:
        patterns:
          - mdast-util-*
          - "@types/mdast"
  # The docs site keeps its own lockfile — without this entry its Astro/
  # Starlight dependencies would never receive update PRs.
  - package-ecosystem: npm
    directory: /website
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    cooldown:
      default-days: 3
      semver-major-days: 7
    groups:
      astro:
        patterns:
          - astro
          - "@astrojs/*"
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 3
      semver-major-days: 7
