version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      types:
        patterns:
          - "@types/*"
      build:
        patterns:
          - tsup
          - typescript
          - vitest
          - oxlint
          - tsx
      mdast:
        patterns:
          - mdast-util-*
          - "@types/mdast"
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
