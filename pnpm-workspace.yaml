# pnpm settings (single-package repo; no `packages` list on purpose).

# Supply-chain guard: never resolve a dependency version published less than
# 3 days ago (minutes). Freshly compromised releases (worm-style npm attacks)
# are usually yanked within hours-to-days; the delay lets them age out before
# `pnpm add`/`pnpm update` can pick them up. CI installs are frozen-lockfile
# and unaffected.
minimumReleaseAge: 4320

# Security floor for a transitive dep that `pnpm update` cannot reach
# (esbuild comes via tsup/vite). The range tracks the Dependabot-advised
# first patched version — drop once the parents require it on their own.
# (vite gets its floor as an explicit devDependency instead: an override on
# a direct dep makes frozen-lockfile installs fail on specifier mismatch.)
overrides:
  esbuild: '>=0.28.1 <0.29'
